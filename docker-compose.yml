services:
  postgres:
    image: postgres:16-alpine
    container_name: devops-benchmark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: benchmark_db
      POSTGRES_USER: benchmark_user
      POSTGRES_PASSWORD: benchmark_password
    ports:
      - target: 5432
        published: 5432
        host_ip: ${HOST_BIND_IP:-0.0.0.0}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benchmark_user -d benchmark_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: devops-benchmark-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: benchmark_db
      DATABASE_USER: benchmark_user
      DATABASE_PASSWORD: benchmark_password
      DATABASE_SYNCHRONIZE: "true"
    ports:
      - target: 3000
        published: 3000
        host_ip: ${HOST_BIND_IP:-0.0.0.0}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    container_name: devops-benchmark-frontend
    restart: unless-stopped
    ports:
      - target: 80
        published: 5173
        host_ip: ${HOST_BIND_IP:-0.0.0.0}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  benchmark-target:
    build:
      context: ./benchmark-target
    container_name: devops-benchmark-target
    restart: unless-stopped
    environment:
      PORT: 4000
    ports:
      - target: 4000
        published: 4000
        host_ip: ${HOST_BIND_IP:-0.0.0.0}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
